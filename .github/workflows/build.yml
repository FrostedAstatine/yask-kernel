name: Build YASK Kernel
on:
  workflow_dispatch:
    inputs:
      kernelDevice:
        description: 'Device codename'
        required: true
        default: 'sapphire'
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout source
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y bc bison flex libssl-dev libelf-dev
        
    - name: Build kernel
      run: |
        export ARCH=arm64
        export SUBARCH=arm64
        export PATH="/usr/lib/llvm-14/bin:$PATH"
        make vendor/bengal_GKI.config
        make -j$(nproc) CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip
        
    - name: Upload kernel
      uses: actions/upload-artifact@v4
      with:
        name: Image
        path: arch/arm64/boot/Image.gz
